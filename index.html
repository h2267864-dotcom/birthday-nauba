<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
    overflow: hidden;
}

/* 📱 Story screen */
#storyScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.story-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid #ff4b5c;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1);}
    50% { transform: scale(1.1);}
    100% { transform: scale(1);}
}

/* 🎂 Main content */
#main {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* ✨ Name animation */
h1 span {
    opacity: 0;
    display: inline-block;
    animation: fadeLetter 0.5s forwards;
}

@keyframes fadeLetter {
    to { opacity: 1; transform: translateY(-10px);}
}

/* 🎂 Cake */
.cake {
    position: relative;
    width: 160px;
    height: 120px;
    margin: 30px auto;
    cursor: pointer;
}

.layer {
    position: absolute;
    width: 100%;
    height: 40px;
    background: #ff6f61;
    border-radius: 10px;
    transition: 1s;
}

.layer:nth-child(1) { top: 0; }
.layer:nth-child(2) { top: 40px; background: #ff3c38; }
.layer:nth-child(3) { top: 80px; background: #d62828; }

.cake.cut .layer:nth-child(1) {
    transform: translateX(-80px) rotate(-15deg);
}
.cake.cut .layer:nth-child(2) {
    transform: translateX(80px) rotate(15deg);
}
.cake.cut .layer:nth-child(3) {
    transform: translateY(50px);
}

/* 🎁 Button */
button {
    padding: 12px 25px;
    border: none;
    background: #ff4b5c;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 15px;
}

/* 💖 Message */
#message {
    display: none;
    margin-top: 20px;
    font-size: 1.3rem;
    animation: pop 1s ease;
}

@keyframes pop {
    from {transform: scale(0);}
    to {transform: scale(1);}
}
</style>
</head>

<body>

<!-- 📱 Story Screen -->
<div id="storyScreen" onclick="openStory()">
    <div class="story-circle">Tap</div>
</div>

<!-- 🎂 Main -->
<div id="main">
    <div>
        <h1 id="title"></h1>

        <p>Tap the cake 🎂👇</p>

        <div class="cake" onclick="cutCake()">
            <div class="layer"></div>
            <div class="layer"></div>
            <div class="layer"></div>
        </div>

        <button onclick="showMessage()">🎁 Click for Surprise</button>

        <div id="message">
            💖 Happy Birthday nauba 💖 <br><br>
            You deserve all happiness 🌍✨ <br>
            Stay amazing always 🔥💫
        </div>
    </div>
</div>

<script>
// 📱 Open story
function openStory(){
    document.getElementById("storyScreen").style.display = "none";
    document.getElementById("main").style.display = "flex";
    animateText("Happy Birthday nauba 🎂");
}

// 💌 Text animation
function animateText(text){
    let title = document.getElementById("title");
    title.innerHTML = "";
    text.split("").forEach((char, i)=>{
        let span = document.createElement("span");
        span.textContent = char;
        span.style.animationDelay = i * 0.1 + "s";
        title.appendChild(span);
    });
}

// 🎂 Cake cut
function cutCake(){
    document.querySelector(".cake").classList.add("cut");
    confetti();
}

// 🎁 Show message
function showMessage(){
    document.getElementById("message").style.display = "block";
    confetti();
}

// 🎉 Confetti
function confetti(){
    for(let i=0;i<60;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="8px";
        c.style.height="8px";
        c.style.background="hsl("+Math.random()*360+",100%,50%)";
        c.style.top="0";
        c.style.left=Math.random()*window.innerWidth+"px";
        document.body.appendChild(c);

        let fall=setInterval(()=>{
            c.style.top=(parseInt(c.style.top)+5)+"px";
            if(parseInt(c.style.top)>window.innerHeight){
                clearInterval(fall);
                c.remove();
            }
        },20);
    }
}
</script>

</body>
</html>
